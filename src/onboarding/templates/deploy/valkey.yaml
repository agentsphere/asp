apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ project_name }}-cache-otel-config
data:
  config.yaml: |
    receivers:
      redis:
        endpoint: localhost:6379
        collection_interval: 15s
    processors:
      resource:
        attributes:
          - key: platform.project_id
            value: "${env:PLATFORM_PROJECT_ID}"
            action: upsert
          - key: service.name
            value: "{{ project_name }}-valkey"
            action: upsert
    exporters:
      otlphttp:
        endpoint: "${env:OTEL_EXPORTER_OTLP_ENDPOINT}"
        headers:
          authorization: "Bearer ${env:OTEL_API_TOKEN}"
    service:
      pipelines:
        metrics:
          receivers: [redis]
          processors: [resource]
          exporters: [otlphttp]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ project_name }}-cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ project_name }}-cache
  template:
    metadata:
      labels:
        app: {{ project_name }}-cache
    spec:
      containers:
        - name: valkey
          image: valkey/valkey:8-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.115.0
          args: ["--config=/etc/otel/config.yaml"]
          volumeMounts:
            - name: otel-config
              mountPath: /etc/otel
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: otel-config
          configMap:
            name: {{ project_name }}-cache-otel-config
---
apiVersion: v1
kind: Service
metadata:
  name: {{ project_name }}-cache
spec:
  selector:
    app: {{ project_name }}-cache
  ports:
    - port: 6379
      targetPort: 6379

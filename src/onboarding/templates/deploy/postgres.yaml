apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ project_name }}-db-otel-config
data:
  config.yaml: |
    receivers:
      postgresql:
        endpoint: localhost:5432
        username: app
        password: changeme
        databases: [app]
        collection_interval: 15s
        tls:
          insecure_skip_verify: true
    processors:
      resource:
        attributes:
          - key: platform.project_id
            value: "${env:PLATFORM_PROJECT_ID}"
            action: upsert
          - key: service.name
            value: "{{ project_name }}-postgres"
            action: upsert
    exporters:
      otlp_http:
        endpoint: "${env:OTEL_EXPORTER_OTLP_ENDPOINT}"
        headers:
          authorization: "Bearer ${env:OTEL_API_TOKEN}"
    service:
      pipelines:
        metrics:
          receivers: [postgresql]
          processors: [resource]
          exporters: [otlp_http]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ project_name }}-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ project_name }}-db
  template:
    metadata:
      labels:
        app: {{ project_name }}-db
    spec:
      initContainers:
        - name: gen-certs
          image: postgres:16-alpine
          command: ["sh", "-c"]
          args:
            - |
              set -e
              apk add --no-cache openssl >/dev/null 2>&1
              openssl req -new -x509 -days 365 -nodes \
                -out /certs/server.crt -keyout /certs/server.key \
                -subj "/CN={{ project_name }}-db"
              chown 70:70 /certs/server.crt /certs/server.key
              chmod 600 /certs/server.key
          volumeMounts:
            - name: certs
              mountPath: /certs
      containers:
        - name: postgres
          image: postgres:16-alpine
          args: ["-c", "ssl=on", "-c", "ssl_cert_file=/certs/server.crt", "-c", "ssl_key_file=/certs/server.key"]
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: app
            - name: POSTGRES_USER
              value: app
            - name: POSTGRES_PASSWORD
              value: changeme
          volumeMounts:
            - name: certs
              mountPath: /certs
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.147.0
          args: ["--config=/etc/otel/config.yaml"]
          volumeMounts:
            - name: otel-config
              mountPath: /etc/otel
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: otel-config
          configMap:
            name: {{ project_name }}-db-otel-config
        - name: certs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ project_name }}-db
spec:
  selector:
    app: {{ project_name }}-db
  ports:
    - port: 5432
      targetPort: 5432

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ project_name }}-db-otel-config
data:
  config.yaml: |
    receivers:
      postgresql:
        endpoint: localhost:5432
        username: app
        password: changeme
        databases: [app]
        collection_interval: 15s
    processors:
      resource:
        attributes:
          - key: platform.project_id
            value: "${env:PLATFORM_PROJECT_ID}"
            action: upsert
          - key: service.name
            value: "{{ project_name }}-postgres"
            action: upsert
    exporters:
      otlphttp:
        endpoint: "${env:OTEL_EXPORTER_OTLP_ENDPOINT}"
        headers:
          authorization: "Bearer ${env:OTEL_API_TOKEN}"
    service:
      pipelines:
        metrics:
          receivers: [postgresql]
          processors: [resource]
          exporters: [otlphttp]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ project_name }}-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ project_name }}-db
  template:
    metadata:
      labels:
        app: {{ project_name }}-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: app
            - name: POSTGRES_USER
              value: app
            - name: POSTGRES_PASSWORD
              value: changeme
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.115.0
          args: ["--config=/etc/otel/config.yaml"]
          volumeMounts:
            - name: otel-config
              mountPath: /etc/otel
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: otel-config
          configMap:
            name: {{ project_name }}-db-otel-config
---
apiVersion: v1
kind: Service
metadata:
  name: {{ project_name }}-db
spec:
  selector:
    app: {{ project_name }}-db
  ports:
    - port: 5432
      targetPort: 5432

# Lightweight Valkey (Redis-compatible) for per-run test namespaces.
# Includes OTEL collector sidecar for Redis metrics.
apiVersion: v1
kind: ConfigMap
metadata:
  name: valkey-otel-config
data:
  config.yaml: |
    receivers:
      redis:
        endpoint: localhost:6379
        password: dev
        collection_interval: 15s
    processors:
      resource:
        attributes:
          - key: service.name
            value: platform-valkey
            action: upsert
          - key: deployment.environment
            value: dev
            action: upsert
    exporters:
      otlphttp:
        endpoint: "${env:OTEL_EXPORTER_OTLP_ENDPOINT}"
        tls:
          insecure: true
        headers:
          authorization: "Bearer ${env:OTEL_API_TOKEN}"
    service:
      pipelines:
        metrics:
          receivers: [redis]
          processors: [resource]
          exporters: [otlphttp]
---
apiVersion: v1
kind: Pod
metadata:
  name: valkey
  labels:
    app: valkey
spec:
  containers:
    - name: valkey
      image: valkey/valkey:8-alpine
      args: ["--save", "", "--appendonly", "no", "--requirepass", "dev"]
      ports:
        - containerPort: 6379
      readinessProbe:
        tcpSocket:
          port: 6379
        initialDelaySeconds: 1
        periodSeconds: 1
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          memory: 512Mi
    - name: otel-collector
      image: otel/opentelemetry-collector-contrib:0.121.0
      args: ["--config=/etc/otel/config.yaml"]
      env:
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "__OTEL_ENDPOINT__"
        - name: OTEL_API_TOKEN
          value: "plat_api_otel_system_dev_000000000000000000000000000000"
      volumeMounts:
        - name: otel-config
          mountPath: /etc/otel
      resources:
        requests:
          cpu: 25m
          memory: 48Mi
        limits:
          cpu: 100m
          memory: 128Mi
  volumes:
    - name: otel-config
      configMap:
        name: valkey-otel-config
---
apiVersion: v1
kind: Service
metadata:
  name: valkey
spec:
  type: NodePort
  selector:
    app: valkey
  ports:
    - port: 6379
      targetPort: 6379

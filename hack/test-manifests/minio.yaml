# Lightweight MinIO for per-run test namespaces.
# Bucket creation handled by deploy-services.sh (mc mb).
# S55: TLS enabled via self-signed certs (same pattern as postgres.yaml).
apiVersion: v1
kind: Pod
metadata:
  name: minio
  labels:
    app: minio
spec:
  securityContext:
    fsGroup: 1000
  initContainers:
    - name: gen-certs
      image: postgres:16-alpine
      command: ["sh", "-c"]
      args:
        - |
          set -e
          echo "[gen-certs] installing openssl..."
          apk add --no-cache openssl
          echo "[gen-certs] generating self-signed cert..."
          mkdir -p /certs/CAs
          openssl req -new -x509 -days 3650 -nodes \
            -subj "/CN=minio" \
            -keyout /certs/private.key -out /certs/public.crt
          cp /certs/public.crt /certs/CAs/public.crt
          chmod 644 /certs/public.crt /certs/CAs/public.crt
          chmod 600 /certs/private.key
          echo "[gen-certs] done — cert ready"
      volumeMounts:
        - name: certs
          mountPath: /certs
  containers:
    - name: minio
      image: quay.io/minio/minio:RELEASE.2025-02-28T09-55-16Z
      args: ["server", "/data", "--certs-dir", "/certs"]
      env:
        - name: MINIO_ROOT_USER
          value: platform
        - name: MINIO_ROOT_PASSWORD
          value: devdevdev
      ports:
        - containerPort: 9000
      readinessProbe:
        httpGet:
          path: /minio/health/live
          port: 9000
          scheme: HTTPS
        initialDelaySeconds: 2
        periodSeconds: 1
      volumeMounts:
        - name: certs
          mountPath: /certs
          readOnly: true
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 512Mi
  volumes:
    - name: certs
      emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: minio
spec:
  type: NodePort
  selector:
    app: minio
  ports:
    - port: 9000
      targetPort: 9000

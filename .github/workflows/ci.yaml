name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: mkdir -p ui/dist && touch ui/dist/index.html
      - run: cargo clippy --all-features -- -D warnings

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - run: mkdir -p ui/dist && touch ui/dist/index.html
      - run: cargo nextest run --lib --profile ci --no-tests=pass

  test-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest

      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: platform
          config: hack/kind-config.yaml

      - run: mkdir -p ui/dist && touch ui/dist/index.html

      - name: Run integration tests
        run: bash hack/test-in-cluster.sh --filter '*_integration'

  test-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest

      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: platform
          config: hack/kind-config.yaml

      - name: Prepare shared mount
        run: |
          mkdir -p /tmp/platform-e2e
          docker exec platform-control-plane mkdir -p /tmp/platform-e2e

      - run: mkdir -p ui/dist && touch ui/dist/index.html

      - name: Run E2E tests
        run: bash hack/test-in-cluster.sh --type e2e

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [test-unit]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@nextest

      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: platform
          config: hack/kind-config.yaml

      - run: mkdir -p ui/dist && touch ui/dist/index.html

      - name: Unit coverage
        run: cargo llvm-cov nextest --lib --lcov --output-path coverage-unit.lcov --ignore-filename-regex '(proto\.rs|ui\.rs)'

      - name: Integration coverage
        run: bash hack/test-in-cluster.sh --filter '*_integration' --coverage --lcov coverage-integration.lcov

      - name: Upload unit coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage-unit.lcov
          flags: unit
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload integration coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage-integration.lcov
          flags: integration
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    needs: [fmt, lint, test-unit, test-integration, test-e2e, deny]
    strategy:
      matrix:
        include:
          - runner: platform-amd64
            arch: amd64
          - runner: platform-arm64
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-${{ matrix.arch }}
      - run: mkdir -p ui/dist && touch ui/dist/index.html
      - run: cargo build --release

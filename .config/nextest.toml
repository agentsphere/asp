[profile.ci]
retries = 1
fail-fast = false

[profile.ci.junit]
path = "junit.xml"

# Tests that bind PLATFORM_LISTEN_PORT must run one at a time.
# The port is fixed by the test harness (registry proxy DaemonSet forwards
# to it), so parallel tests would get AddrInUse.
[test-groups.pipeline-server]
max-threads = 1

[[profile.ci.overrides]]
filter = "test(demo_pipeline_mr_steps_not_filtered) | test(demo_pipeline_secrets_injected) | test(demo_pipeline_steps_terminal) | test(demo_pipeline_otel_token_created) | test(demo_full_lifecycle)"
test-group = "pipeline-server"
